<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Guru - IPEKA Character Champion</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
}

.login-box{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card-glass{
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
width:100%;
max-width:500px;
}

.hidden{
display:none;
}

.cardx{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.navbar{
background:#111827;
}

.badge-point{
font-size:1.1rem;
padding:10px;
}
</style>

</head>

<body>

<!-- LOGIN GURU -->

<div id="loginGuru" class="login-box">

<div class="card-glass text-center">

<h1>🎓 Dashboard Guru</h1>

<p>IPEKA Character Champion</p>

<input
type="password"
id="pinGuru"
class="form-control mb-3"
placeholder="Masukkan PIN Guru">

<button
class="btn btn-warning w-100"
onclick="loginGuru()">

MASUK

</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboardGuru" class="hidden">

<nav class="navbar navbar-dark">
<div class="container-fluid">

<span class="navbar-brand">
🎓 Dashboard Guru
</span>

<button
class="btn btn-outline-light"
onclick="logout()">

Logout

</button>

</div>
</nav>

<div class="container py-4">

<div class="cardx">

<h3>📝 Penilaian Karakter</h3>

<select
id="siswa"
class="form-select mb-3">

<option>Pilih Siswa</option>

<option>Andi</option>
<option>Budi</option>
<option>Citra</option>
<option>Doni</option>

</select>

<textarea
id="catatan"
class="form-control mb-3"
placeholder="Catatan Guru"></textarea>

<label>Poin Karakter</label>

<input
type="number"
id="poin"
class="form-control mb-3"
placeholder="+10 atau -10">

<button
class="btn btn-success"
onclick="simpanPenilaian()">

SIMPAN PENILAIAN

</button>

</div>

<div class="cardx">

<h3>⭐ Penilaian Cepat</h3>

<button
class="btn btn-success me-2 mb-2"
onclick="setPoin(10,'Membantu teman')">

+10 Membantu Teman

</button>

<button
class="btn btn-success me-2 mb-2"
onclick="setPoin(15,'Menjadi Teladan')">

+15 Teladan

</button>

<button
class="btn btn-danger me-2 mb-2"
onclick="setPoin(-10,'Mengganggu kelas')">

-10 Mengganggu

</button>

<button
class="btn btn-danger mb-2"
onclick="setPoin(-15,'Tidak sopan')">

-15 Tidak Sopan

</button>

</div>

<div class="cardx">

<h3>🏆 Leaderboard</h3>

<table class="table table-dark">

<thead>
<tr>
<th>Rank</th>
<th>Nama</th>
<th>Poin</th>
</tr>
</thead>

<tbody>

<tr>
<td>🥇</td>
<td>Andi</td>
<td>520</td>
</tr>

<tr>
<td>🥈</td>
<td>Budi</td>
<td>500</td>
</tr>

<tr>
<td>🥉</td>
<td>Citra</td>
<td>470</td>
</tr>

</tbody>

</table>

</div>

</div>

</div>

<script>

const PIN_GURU = "123456";

function loginGuru(){

const pin =
document.getElementById("pinGuru").value;

if(pin === PIN_GURU){

document.getElementById("loginGuru")
.style.display="none";

document.getElementById("dashboardGuru")
.classList.remove("hidden");

}else{

alert("PIN salah!");

}

}

function logout(){

location.reload();

}

function setPoin(nilai,keterangan){

document.getElementById("poin").value = nilai;

document.getElementById("catatan").value =
keterangan;

}

async function simpanPenilaianGuru(){

 const data = {

   action:"penilaianGuru",

   nama:
   document.getElementById("siswa").value,

   kelas:"8A",

   poin:
   document.getElementById("poin").value,

   catatan:
   document.getElementById("catatan").value,

   guru:"Guru"

 };

 const response =
 await fetch(
   "https://script.google.com/macros/s/AKfycbz5vrGfFkqI-wCkulDhRJszpBGlU8Ip3Ce7x_s3PgJh2py5A8vPwXWjZ4GJJ4SaXuGaow/exec",
   {
     method:"POST",
     body:JSON.stringify(data)
   }
 );

 const result =
 await response.json();

 if(result.status){

   alert(
   "Penilaian berhasil disimpan"
   );

 }

}
</script>

</body>
</html>
